        <h1>白鹿原 Minecraft 服务器</h1>
        <p>白鹿原是一个<strong>永不换档的纯净原版生存 Minecraft 服务器</strong>，自 2021 年 9 月 14 日开服至今从未重置存档，玩家的每一份建筑与成果都将永久保留。服务器支持 Java 版与基岩版互通，无论你使用电脑、手机还是平板，都可以在同一个世界中共同游玩。服务器地址为 <strong>mcpure.lunadeer.cn</strong>，所有玩家均可免费加入。</p>

        <h2>白鹿原服务器有什么特色？</h2>
        <p>白鹿原坚持纯净原版生存理念——没有纷繁复杂的 Mod，没有破坏平衡的插件，一切简单得就像单机模式的共享。服务器使用物理工作站（非云服务器）保障 7×24 小时低延迟稳定运行，并始终紧跟 Minecraft 最新版本更新。</p>
        <ul>
          <li><strong>永不换档</strong>：开服以来从未重置，所有玩家建筑与进度永久保留</li>
          <li><strong>纯净原版</strong>：无 Mod、无破坏平衡的插件，保持原汁原味的生存体验</li>
          <li><strong>Java 与基岩互通</strong>：电脑端 Java 版和手机/平板基岩版玩家可同服游玩</li>
          <li><strong>免费圈地保护</strong>：自研 Dominion 领地插件，玩家可免费保护私人领地</li>
          <li><strong>自研插件体系</strong>：Dominion 领地管理、MiniPlayerTitle 称号系统等多款原创插件</li>
          <li><strong>物理工作站</strong>：非云服务器，物理机运行保障低延迟体验</li>
          <li><strong>完全免费</strong>：无任何付费门槛，所有功能和公共设施免费开放</li>
        </ul>

        <h2>如何加入白鹿原 Minecraft 服务器？</h2>
        <p>加入白鹿原非常简单，只需四步：</p>
        <ol>
          <li><strong>阅读服务器公约</strong>：了解并同意服务器规则，公约内容可在<a href="/join">加入游戏指引</a>页面查看</li>
          <li><strong>选择你的设备</strong>：支持 Windows、macOS、Linux 电脑端，以及 iOS 和 Android 移动设备</li>
          <li><strong>配置服务器地址</strong>：在游戏中添加服务器地址 mcpure.lunadeer.cn（Java 版端口 25565，基岩版端口 19132）</li>
          <li><strong>开始冒险</strong>：连接服务器，选择适合你的玩法，开启纯净原版生存之旅</li>
        </ol>

        <h2>服务器公共设施与资源</h2>
        <p>白鹿原拥有丰富的全服共享公共设施，由玩家共同建设、共同分享，包含各类自动化农场、刷怪塔、交易所等实用设施。每个设施都提供详细的坐标位置和使用说明，让纯净原版生存更加便捷轻松。访问<a href="/facilities">共享资源</a>页面查看完整设施列表。</p>

        <h2>城镇与社区</h2>
        <p>服务器内拥有多个特色城镇，各有独特的建筑风格和社区文化。从小型聚居地到大型城市，玩家可以选择加入心仪的城镇或自行创建新城镇。访问<a href="/towns">城镇介绍</a>页面了解各城镇详情。</p>

        <h2>玩家数据与排行榜</h2>
        <p>白鹿原提供全面的玩家数据统计与排行榜系统，涵盖游戏时长、方块放置与破坏数、击杀数、死亡数等多项数据指标。搜索玩家名即可查看个人详细统计信息。访问<a href="/stats">玩家数据统计</a>页面发现最活跃的冒险家们。</p>
